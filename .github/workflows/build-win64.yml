name: Build and Release Win64

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      OUTPUT_FOLDER: ./build

    steps:
      # 1. 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. .love 파일 직접 생성 (가장 중요)
      - name: Package .love file
        shell: bash
        run: |
          7z a -tzip game.love main.lua conf.lua assets data lib states systems ui

          echo "==== game.love 내부 구조 ===="
          7z l game.love

          echo "==== main.lua 위치 확인 ===="
          7z l game.love | grep " main.lua$" || (echo "❌ main.lua NOT at root!" && exit 1)

      # 3. Windows 실행파일 빌드
      - name: Build Windows packages
        uses: love-actions/love-actions-windows@v2
        with:
          love-package: ./game.love
          product-name: sector07
          output-folder: ${{ env.OUTPUT_FOLDER }}

      # 4. 빌드 결과 확인 (디버깅용)
      - name: List build outputs
        shell: bash
        run: |
          echo "==== build 결과 ===="
          ls -R ${{ env.OUTPUT_FOLDER }}

      # 5. GitHub Release 생성
      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Automated Build' }}
          files: |
            ${{ env.OUTPUT_FOLDER }}/sector07_x64.zip
            ${{ env.OUTPUT_FOLDER }}/sector07_x86.zip
          generate_release_notes: true
          prerelease: ${{ github.ref_type != 'tag' }}
